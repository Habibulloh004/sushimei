version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sushimei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sushimei
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sushimei-backend
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sushimei?sslmode=disable
      APP_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
